<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Varek — Skill Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e14;color:#c8c0b0;font-family:'Georgia',serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── Header ── */
header{background:#0a0a10;border-bottom:1px solid #2a2a3d;padding:18px 32px;display:flex;align-items:baseline;gap:16px}
header h1{color:#c9a84c;font-size:1.5rem;letter-spacing:.08em;font-weight:normal}
header span{color:#6a6480;font-size:.85rem;letter-spacing:.04em}

/* ── Layout ── */
.layout{display:flex;min-height:calc(100vh - 57px)}

/* ── Sidebar ── */
nav.sidebar{width:180px;min-width:180px;background:#0a0a10;border-right:1px solid #1e1e2e;padding:20px 0;position:sticky;top:0;height:calc(100vh - 57px);overflow-y:auto}
nav.sidebar button{display:block;width:100%;text-align:left;padding:10px 20px;background:none;border:none;color:#8a8098;cursor:pointer;font-family:'Georgia',serif;font-size:.9rem;transition:color .15s,background .15s;border-left:3px solid transparent}
nav.sidebar button:hover{color:#c8c0b0;background:#141420}
nav.sidebar button.active{color:#c9a84c;border-left-color:#c9a84c;background:#141420}
.cat-count{float:right;font-size:.75rem;color:#4a4458;margin-top:1px}

/* ── Main ── */
main{flex:1;padding:24px 28px;overflow-y:auto}
.section-title{color:#6a6480;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;padding-bottom:6px;border-bottom:1px solid #1e1e2e}

/* ── Skill Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:32px}

/* ── Skill Card ── */
.card{background:#141420;border:1px solid #1e1e2e;border-radius:4px;padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.card:hover{border-color:#3a3a5a;background:#181828}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-right:66px}
.card-icon{font-size:1.4rem;line-height:1;width:32px;text-align:center}
.card-name{color:#d4c9b0;font-size:.95rem;font-weight:normal;flex:1}
.card-slots{font-size:.72rem;color:#8a8098;margin-top:2px}
.slot-pip{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2a2a3d;margin-right:2px}
.slot-pip.filled{background:#c9a84c}
.card-summary{font-size:.78rem;color:#7a7288;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cat-badge{position:absolute;top:10px;right:10px;font-size:.65rem;padding:2px 6px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;opacity:.8}

/* Category badge colors */
.badge-combat{background:#3d1212;color:#e07070}
.badge-physical{background:#12301a;color:#70c080}
.badge-crafting{background:#3d2410;color:#e09040}
.badge-knowledge{background:#251040;color:#9060d0}
.badge-social{background:#10253d;color:#5090d0}
.badge-magic{background:#2d2510;color:#c9a84c}
.badge-special{background:#202030;color:#9090c0}

/* ── Modal ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:#131320;border:1px solid #2a2a3d;border-radius:6px;max-width:740px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-header{padding:22px 26px 16px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:14px}
.modal-icon{font-size:2rem;line-height:1}
.modal-title{flex:1}
.modal-title h2{color:#c9a84c;font-size:1.25rem;font-weight:normal;margin-bottom:4px}
.modal-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.modal-cat{font-size:.72rem;padding:2px 8px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase}
.modal-slots{font-size:.82rem;color:#8a8098}
.modal-atrophy{font-size:.72rem;padding:2px 7px;border-radius:2px}
.atrophy-none{background:#12301a;color:#70c080}
.atrophy-slow{background:#2d2000;color:#c08040}
.atrophy-moderate{background:#2d1800;color:#d06030}
.atrophy-fast{background:#2d1010;color:#e05050}
.modal-close{background:none;border:none;color:#6a6480;cursor:pointer;font-size:1.4rem;padding:4px 8px;transition:color .15s;align-self:flex-start}
.modal-close:hover{color:#c9a84c}
.modal-body{padding:20px 26px}
.modal-summary{color:#b0a898;line-height:1.7;margin-bottom:20px;font-size:.92rem}
.modal-section{margin-bottom:20px}
.modal-section-label{color:#6a6480;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.discovery-text{color:#8a8098;font-size:.85rem;line-height:1.6;font-style:italic}
.cost-text{color:#c08040;font-size:.85rem;line-height:1.6}

/* Tier table */
.tier-table{width:100%;border-collapse:collapse;font-size:.83rem}
.tier-table tr{border-bottom:1px solid #1a1a28}
.tier-table tr:last-child{border-bottom:none}
.tier-table td{padding:7px 10px;vertical-align:top}
.tier-name{color:#c9a84c;width:100px;white-space:nowrap;font-size:.8rem}
.tier-desc{color:#9a9298;line-height:1.5}

/* Combinations */
.combo-list{list-style:none}
.combo-list li{color:#8a8098;font-size:.83rem;line-height:1.5;padding:4px 0;border-bottom:1px solid #1a1a28}
.combo-list li:last-child{border-bottom:none}
.combo-list li::before{content:'◆ ';color:#3a3a5a;font-size:.65rem}

/* Faction table */
.faction-table{width:100%;border-collapse:collapse;font-size:.8rem}
.faction-table tr{border-bottom:1px solid #1a1a28}
.faction-table tr:last-child{border-bottom:none}
.faction-table td{padding:6px 10px;vertical-align:top}
.faction-name{color:#c9a84c;width:160px;white-space:nowrap}
.faction-react{color:#8a8098;line-height:1.5}

/* Search */
.search-wrap{margin-bottom:20px}
.search-wrap input{width:100%;background:#141420;border:1px solid #2a2a3d;border-radius:3px;padding:9px 14px;color:#c8c0b0;font-family:'Georgia',serif;font-size:.9rem;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:#3a3a5a}
.search-wrap input::placeholder{color:#4a4458}

/* No results */
.no-results{color:#4a4458;text-align:center;padding:40px;font-style:italic}

/* Responsive */
@media(max-width:600px){
  nav.sidebar{width:140px;min-width:140px}
  main{padding:16px}
  .modal{max-width:100%;max-height:100vh;border-radius:0}
}
</style>
</head>
<body>

<header>
  <h1>VAREK</h1>
  <span>Skill Reference — <span id="total-count">0</span> skills</span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search skills…" autocomplete="off">
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-icon" id="m-icon"></div>
      <div class="modal-title">
        <h2 id="m-name"></h2>
        <div class="modal-meta">
          <span class="modal-cat" id="m-cat"></span>
          <span class="modal-slots" id="m-slots"></span>
          <span class="modal-atrophy" id="m-atrophy"></span>
        </div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-summary" id="m-summary"></div>
      <div class="modal-section" id="m-discovery-wrap">
        <div class="modal-section-label">Discovery</div>
        <div class="discovery-text" id="m-discovery"></div>
      </div>
      <div class="modal-section" id="m-cost-wrap">
        <div class="modal-section-label">Cost</div>
        <div class="cost-text" id="m-cost"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-label">Tiers</div>
        <table class="tier-table" id="m-tiers"></table>
      </div>
      <div class="modal-section" id="m-combos-wrap">
        <div class="modal-section-label">Combinations</div>
        <ul class="combo-list" id="m-combos"></ul>
      </div>
      <div class="modal-section" id="m-factions-wrap">
        <div class="modal-section-label">Faction Reactions</div>
        <table class="faction-table" id="m-factions"></table>
      </div>
    </div>
  </div>
</div>

<script>
var CATEGORIES = [
  { id:'all',      label:'All Skills' },
  { id:'combat',   label:'Combat' },
  { id:'physical', label:'Physical' },
  { id:'crafting', label:'Crafting' },
  { id:'knowledge',label:'Knowledge' },
  { id:'social',   label:'Social' },
  { id:'magic',    label:'Magic' },
  { id:'special',  label:'Special' }
];

var CAT_BADGE = {
  combat:'combat', physical:'physical', crafting:'crafting',
  knowledge:'knowledge', social:'social', magic:'magic', special:'special'
};

var ATROPHY_LABEL = { none:'Permanent', slow:'Slow fade', moderate:'Moderate fade', fast:'Fast fade' };

var SKILLS = [
  // ─── COMBAT ─────────────────────────────────────────────────────────────
  {
    id:'swordsmanship', name:'Swordsmanship', icon:'⚔', category:'combat', slots:1, atrophy:'slow',
    discovery:'Pick up any blade longer than a dagger. Begin using it.',
    summary:'The most common weapon in Varek and the most practiced. Balanced offense, balanced defense. No dominant strength, no significant weakness. The sword does not specialise — it answers whatever the moment requires.',
    tiers:[
      {name:'Novice',    desc:'Wide cuts and obvious guards. You connect more than you miss. That is the whole of it.'},
      {name:'Apprentice',desc:'Basic combinations. You stop telegraphing every intention. Parry and counter begins to feel natural.'},
      {name:'Journeyman',desc:'Economy of motion. Opponents spend effort reading you that you no longer need to spend on them.'},
      {name:'Expert',    desc:'Others notice. The footwork is doing half the work before the blade arrives.'},
      {name:'Master',    desc:'Stillness before violence. Experienced practitioners identify the school from twenty feet away, before anything is drawn.'}
    ]
  },
  {
    id:'axes', name:'Axes', icon:'🪓', category:'combat', slots:1, atrophy:'slow',
    discovery:'Use any axe — woodcutting or battlefield — in a context requiring force.',
    summary:'Slow to swing. Difficult to fully block. An axe ignores some armour, hooks shields, and degrades enemy weapons on contact. The weapon of those who prefer to dismantle a defence rather than outmanoeuvre it.',
    tiers:[
      {name:'Novice',    desc:'Heavy and telegraphed. You swing and trust the weight to do the work.'},
      {name:'Apprentice',desc:'You stop fighting the weight. Timing becomes a tool.'},
      {name:'Journeyman',desc:'Shield hooks. Weapon-binding. You use the beard to open what a straight blade would not reach.'},
      {name:'Expert',    desc:'Armour becomes less relevant. You find the angle that defeats it.'},
      {name:'Master',    desc:'One strike answers questions a sword would spend three asking.'}
    ]
  },
  {
    id:'spears', name:'Spears', icon:'🔱', category:'combat', slots:1, atrophy:'slow',
    discovery:'Use any polearm — spear, halberd, pike — in combat or practice.',
    summary:'Reach is the advantage. A spear-user who understands distance controls engagements before they begin. Formations of spears have stopped cavalry charges. A single expert has made an armoured knight refuse to close.',
    tiers:[
      {name:'Novice',    desc:'The reach advantage is real. You do not know how to use it yet.'},
      {name:'Apprentice',desc:'Distance management. Opponents on short weapons struggle to close.'},
      {name:'Journeyman',desc:'Formation discipline. You understand that a spear performs in a line, not alone.'},
      {name:'Expert',    desc:'You brace for cavalry. You set for a charge. Distance is a weapon that does not run out.'},
      {name:'Master',    desc:'The footwork that maintains reach. No one enters inside unless you choose to allow it.'}
    ]
  },
  {
    id:'bows', name:'Bows', icon:'🏹', category:'combat', slots:1, atrophy:'slow',
    discovery:'Draw and loose a bow at any target, in practice or earnest.',
    summary:'Sustained ranged capability. Moving while aiming is itself a skill — a beginner must stop to shoot; an expert walks, turns, and looses without breaking stride. Draw weight trades speed for damage.',
    tiers:[
      {name:'Novice',    desc:'Stationary shooting at close range. The arrow reaches the target. Often.'},
      {name:'Apprentice',desc:'Range and moderate movement. You understand how draw weight affects accuracy.'},
      {name:'Journeyman',desc:'Full movement while aiming. Snap-shooting. Predictive leading for moving targets.'},
      {name:'Expert',    desc:'Elevation, wind, distance are variables you calculate without thinking.'},
      {name:'Master',    desc:'The arrow arrives where attention is directed. The mechanical process has become invisible.'}
    ]
  },
  {
    id:'crossbows', name:'Crossbows', icon:'🎯', category:'combat', slots:1, atrophy:'slow',
    discovery:'Load and fire any crossbow.',
    summary:'No draw skill required. Devastating power, very slow reload. Near-useless at close range — if an enemy reaches you between shots, you have a problem.',
    tiers:[
      {name:'Novice',    desc:'Aim, fire, reload. The sequence is slower than it should be.'},
      {name:'Apprentice',desc:'Reload efficiency improves. You learn to position for the gap between shots.'},
      {name:'Journeyman',desc:'Effective range understanding. Bracing for maximum accuracy.'},
      {name:'Expert',    desc:'Reload fast enough that some opponents do not realise a second shot is coming.'},
      {name:'Master',    desc:'Mechanical mastery of the device itself — maintenance, modification, its exact limits.'}
    ]
  },
  {
    id:'shields', name:'Shields', icon:'🛡', category:'combat', slots:1, atrophy:'slow',
    discovery:'Use any shield in a combat situation.',
    summary:'A shield is not passive defence. An expert uses it to control space, set angles, and create openings. Used with an axe it hooks and pries. Used with a spear it becomes a wall. The shield practitioner manages rather than simply absorbs.',
    tiers:[
      {name:'Novice',    desc:'Interpose the shield between yourself and the threat. This works more often than nothing.'},
      {name:'Apprentice',desc:'Angling for deflection. The shield turns blows rather than absorbing them.'},
      {name:'Journeyman',desc:'Shield bashing as technique. Creating openings. Controlling opponent positioning.'},
      {name:'Expert',    desc:'The shield as a weapon — feints, hooks, setting angles for your main hand.'},
      {name:'Master',    desc:'Space control. A master shield practitioner does not have a defensive posture. They have a domain.'}
    ]
  },
  {
    id:'unarmed', name:'Unarmed', icon:'✊', category:'combat', slots:1, atrophy:'slow',
    discovery:'Fight without a weapon. Not necessarily by choice.',
    summary:'Grappling, strikes, joint manipulation. An unarmed practitioner can disarm, throw, pin, and incapacitate without killing. In a world where weapons are everywhere, choosing not to use one is a statement.',
    tiers:[
      {name:'Novice',    desc:'Wild swings. Grapples that rely on strength rather than technique.'},
      {name:'Apprentice',desc:'Basic throws and joint locks. You can restrain a resisting person.'},
      {name:'Journeyman',desc:'Disarms. Transitions between striking and grappling. Leverage over strength.'},
      {name:'Expert',    desc:'Weapon grappling — taking a drawn weapon from someone who expected to use it.'},
      {name:'Master',    desc:'Economy of force. The minimum applied exactly. An armed opponent is not automatically an advantage.'}
    ]
  },
  {
    id:'dodge', name:'Dodge', icon:'💨', category:'combat', slots:1, atrophy:'slow',
    discovery:'Avoid an incoming attack by moving your body out of the way.',
    summary:'Active avoidance. Not running — moving the minimum necessary to not be where the strike arrives. A dodger makes the attacker miss, and a miss costs the attacker something.',
    tiers:[
      {name:'Novice',    desc:'You move out of the way. Sometimes faster than the attack.'},
      {name:'Apprentice',desc:'Reading telegraphs. You begin to move before the strike commits.'},
      {name:'Journeyman',desc:'Minimum viable movement. You stop throwing yourself out of range and start removing only what needs to move.'},
      {name:'Expert',    desc:'Counterattack from the dodge. The miss becomes an opening.'},
      {name:'Master',    desc:'Stillness punctuated by exactly the movement necessary. Others find it disorienting — they cannot read the intent.'}
    ]
  },
  {
    id:'block', name:'Block', icon:'🚧', category:'combat', slots:1, atrophy:'slow',
    discovery:'Interpose a weapon or arm between yourself and an incoming strike.',
    summary:'Absorbing or deflecting force with weapon, arm, or armoured body part. Blocking costs stamina and weapon condition. It is an exchange. The expert chooses which exchanges are favourable.',
    tiers:[
      {name:'Novice',    desc:'You catch the blow. It costs more stamina than it should.'},
      {name:'Apprentice',desc:'Angling for deflection reduces impact. Your weapon lasts longer.'},
      {name:'Journeyman',desc:'Parry distinct from block — redirecting rather than stopping.'},
      {name:'Expert',    desc:'Reading whether to block, parry, or dodge before the strike arrives.'},
      {name:'Master',    desc:'A block is only taken when it is the best available option. A master rarely needs to.'}
    ]
  },
  // ─── PHYSICAL ────────────────────────────────────────────────────────────
  {
    id:'stealth', name:'Stealth', icon:'👤', category:'physical', slots:1, atrophy:'moderate',
    discovery:'Move without being detected in a situation where detection matters.',
    summary:'Movement through shadow and silence. Not invisibility — probability management. A skilled practitioner gives the observer nothing worth noticing.',
    tiers:[
      {name:'Novice',    desc:'Moving slowly reduces noise. This is the whole of your repertoire.'},
      {name:'Apprentice',desc:'Understanding sight angles and ambient sound. You pick routes rather than just speeds.'},
      {name:'Journeyman',desc:'Carrying objects without noise. Shadows as cover. Moving through attention rather than around it.'},
      {name:'Expert',    desc:'In environments where stealth is possible, your passage leaves no trace others can follow.'},
      {name:'Master',    desc:'Observed by someone actively looking. They look at you and see furniture.'}
    ]
  },
  {
    id:'athletics', name:'Athletics', icon:'🏃', category:'physical', slots:1, atrophy:'slow',
    discovery:'Run, climb, jump — sustained physical effort beyond walking.',
    summary:'Endurance and capability across all movement types. Climbing walls, sprinting across rooftops, sustained running through rough terrain. The practitioner who invests here can go where most people decide not to.',
    tiers:[
      {name:'Novice',    desc:'You can run. Moderately far. Roughly where you intend to go.'},
      {name:'Apprentice',desc:'Climbing with handholds. Running in armour without stopping.'},
      {name:'Journeyman',desc:'Freerunning over obstacles. Extended sprints. Using terrain as a tool.'},
      {name:'Expert',    desc:'Environments that would stop others — sheer walls, rushing water — become options.'},
      {name:'Master',    desc:'Physical capability the world is not built for. Some walls are tall. That is a problem for other people.'}
    ]
  },
  {
    id:'survival', name:'Survival', icon:'🌿', category:'physical', slots:1, atrophy:'moderate',
    discovery:'Spend significant time in wilderness — navigating, finding water, making shelter.',
    summary:'Reading terrain, finding water and food, making shelter, navigating without landmarks. The deep wilderness between Varek\'s settlements kills the unprepared. A Survival practitioner reads that wilderness as an environment, not a threat.',
    tiers:[
      {name:'Novice',    desc:'You can orient yourself roughly. Find water. Not starve, given time.'},
      {name:'Apprentice',desc:'Track animals. Identify edible and dangerous plants. Predict weather short-term.'},
      {name:'Journeyman',desc:'Navigate by stars and terrain. Set traps. Read environmental signs of danger.'},
      {name:'Expert',    desc:'The wilderness is readable — who passed, what lives here, what changed recently.'},
      {name:'Master',    desc:'Extended months in the deep wilderness with nothing brought in. The land is sufficient.'}
    ]
  },
  {
    id:'swimming', name:'Swimming', icon:'🌊', category:'physical', slots:1, atrophy:'slow',
    discovery:'Enter water over your head.',
    summary:'Staying afloat and moving through water. Without armour, a master uses water as a travel medium and tactical space. Many enemies cannot follow.',
    tiers:[
      {name:'Novice',    desc:'You do not drown. Immediately.'},
      {name:'Apprentice',desc:'Sustained movement in calm water. Basic diving.'},
      {name:'Journeyman',desc:'River current. Weighted swimming. Underwater movement with breath management.'},
      {name:'Expert',    desc:'Water is a tactical space. Currents, visibility, depth are variables you manage.'},
      {name:'Master',    desc:'Moving in water the way a fish does — without fight, with the current as much as against it.'}
    ]
  },
  // ─── CRAFTING ─────────────────────────────────────────────────────────────
  {
    id:'smithing', name:'Smithing', icon:'🔨', category:'crafting', slots:1, atrophy:'moderate',
    discovery:'Work metal — heating, hammering, shaping — toward any purpose.',
    summary:'Creation and maintenance of metal goods: weapons, armour, tools, hardware. A skilled smith\'s products outlast their maker. The weapon condition system means smithing is never a one-time investment.',
    tiers:[
      {name:'Novice',    desc:'Rough shapes. Serviceable tools. Nothing an experienced smith would show a customer.'},
      {name:'Apprentice',desc:'Consistent quality on simple pieces. Basic repairs without degrading the original.'},
      {name:'Journeyman',desc:'Weapons and armour that a trained soldier would choose. Understanding of metallurgy.'},
      {name:'Expert',    desc:'Custom work. Understanding what a user needs before they know how to articulate it.'},
      {name:'Master',    desc:'The work speaks for itself. Other smiths identify the hand behind it.'}
    ]
  },
  {
    id:'carpentry', name:'Carpentry', icon:'🪵', category:'crafting', slots:1, atrophy:'moderate',
    discovery:'Work wood toward a structural or functional purpose.',
    summary:'Construction, furniture, tool handles, wagon frames, siege implements. Almost everything built in Varek\'s settlements has a carpenter behind it. A master can look at a structure and know how it will fail — and how to prevent it.',
    tiers:[
      {name:'Novice',    desc:'Joints that hold. Surfaces that are flat.'},
      {name:'Apprentice',desc:'Complex joinery. Structural work that does not require constant maintenance.'},
      {name:'Journeyman',desc:'Efficient use of materials. Reading grain and quality before cutting.'},
      {name:'Expert',    desc:'Structural assessment — understanding weight, load, failure points in existing construction.'},
      {name:'Master',    desc:'Construction that outlasts the builder. Other practitioners recognise the joint work.'}
    ]
  },
  {
    id:'leatherworking', name:'Leatherworking', icon:'🧵', category:'crafting', slots:1, atrophy:'moderate',
    discovery:'Process and work animal hide into goods.',
    summary:'Armour, boots, bags, saddles, scabbards. Leather is flexible where metal is not and lighter where metal is heavy. An Expert produces work that combines protection, durability, and comfort in ways a beginning armourer cannot achieve.',
    tiers:[
      {name:'Novice',    desc:'Workable goods that serve their function. Not beautiful. Not lasting.'},
      {name:'Apprentice',desc:'Consistent thickness, proper tanning, basic shaping and stitching.'},
      {name:'Journeyman',desc:'Armour that does not chafe. Bags with load distribution. Understanding fit.'},
      {name:'Expert',    desc:'Custom work. Material selection. Pieces that improve with wear.'},
      {name:'Master',    desc:'The craft becomes invisible — what remains is only the thing that was made.'}
    ]
  },
  {
    id:'alchemy', name:'Alchemy', icon:'⚗', category:'crafting', slots:1, atrophy:'moderate',
    discovery:'Prepare a compound — medicinal, poisonous, or reactive — with intent.',
    summary:'Potions, medicines, poisons, reactive compounds. Alchemy produces effects that magic cannot duplicate exactly — a well-prepared remedy works on those with low Magic Affinity, requires no casting, and leaves no magical signature.',
    tiers:[
      {name:'Novice',    desc:'Basic remedies. Wound-cleansing. Simple compounds with a single effect.'},
      {name:'Apprentice',desc:'Consistent production. Identifying materials in the wild. Basic poisons.'},
      {name:'Journeyman',desc:'Complex compounds. Long-duration effects. Interaction awareness.'},
      {name:'Expert',    desc:'Custom formulation. Compounds that interact with magic in predictable ways.'},
      {name:'Master',    desc:'Effects no single plant or mineral produces. Knowledge that cannot be found in any one book.'}
    ]
  },
  {
    id:'cooking', name:'Cooking', icon:'🍖', category:'crafting', slots:1, atrophy:'moderate',
    discovery:'Prepare food for consumption beyond raw eating.',
    summary:'Sustenance is survival. Prepared food provides more than raw ingredients — the benefits compound with skill level. An expert cook keeps an army on its feet with less. A settlement around a skilled cook has lower illness and higher morale.',
    tiers:[

    factions:{"Ashen Covenant":"Crusade-level response. Tears holes in creation itself, by their theology.","Ironveil Compact":"Extreme caution — the commercial risks of collapsing anchors are unacceptable","Keth'ari Remnant":"Aware it exists. Will not discuss what they know.","Thornbound":"Deep unease. The entities are not people in any sense the Thornbound can apply.","Steel Throne":"Classified threat. Active containment protocols exist.","Bleached Court":"Fascinated and unsettled. This is not necromancy and they know it.","Greenskin Clans":"Terror. The entities feel wrong in ways that animal instinct registers before thought does.","Wandering Houses":"No one will openly admit to knowing about it.","The Athenaeum":"Their most active and most secretive research area."}
  },
  // ─── SPECIAL ─────────────────────────────────────────────────────────────
  {
    id:'dominion', name:'Dominion', icon:'👑', category:'special', slots:1, atrophy:'fast',
    discovery:'Develops alongside Necromancy or Summoning. Emerges from the need to manage more entities than individual attention can serve.',
    cost:'A Mindspace slot and ongoing attentiveness. Dominion held without active entities is passive maintenance.',
    summary:'Mass command. The shared support skill for both Necromancers and Summoners. Does not raise the dead or extract from The Between — it solves the problem that emerges when what has been raised or summoned exceeds individual management capacity.',
    tiers:[
      {name:'Novice',    desc:'Group orders to small clusters (3–5). Basic formation movement.'},
      {name:'Apprentice',desc:'Coordinated formations up to a dozen. Standing orders that persist without direct oversight.'},
      {name:'Journeyman',desc:'Squad-level tactical command. Delegate oversight to senior entities. Settlement workforce management becomes practical.'},
      {name:'Expert',    desc:'Army-scale coordination. Complex multi-group tactics. A settlement runs itself under general direction.'},
      {name:'Master',    desc:"The practitioner's will operates as an ambient field. Every entity within range knows its role and executes without explicit instruction."}
    ],
    combinations:['Dominion + Necromancy — essential for Warlord scale or Steward settlement management.','Dominion + Summoning — coordinates multiple Between-touched entities simultaneously.','Dominion + both — the full hybrid build. Required to manage both forces without collapse.']
  }
];

// ─── State ───────────────────────────────────────────────────────────────────
var activeCat = 'all';
var searchQuery = '';

// ─── Build sidebar ───────────────────────────────────────────────────────────
function countCat(catId) {
  if (catId === 'all') return SKILLS.length;
  return SKILLS.filter(function(s){ return s.category === catId; }).length;
}

function buildSidebar() {
  var nav = document.getElementById('sidebar');
  nav.innerHTML = '';
  CATEGORIES.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = cat.id === activeCat ? 'active' : '';
    btn.innerHTML = cat.label + '<span class="cat-count">' + countCat(cat.id) + '</span>';
    btn.addEventListener('click', function() {
      activeCat = cat.id;
      searchQuery = '';
      document.getElementById('search').value = '';
      buildSidebar();
      buildGrid();
    });
    nav.appendChild(btn);
  });
}

// ─── Slot pips ───────────────────────────────────────────────────────────────
function slotPips(slots, maxSlots) {
  maxSlots = maxSlots || 3;
  var html = '';
  for (var i = 0; i < maxSlots; i++) {
    html += '<span class="slot-pip' + (i < slots ? ' filled' : '') + '"></span>';
  }
  return html;
}

// ─── Build grid ──────────────────────────────────────────────────────────────
function buildGrid() {
  var container = document.getElementById('content');
  var q = searchQuery.toLowerCase();

  var filtered = SKILLS.filter(function(s) {
    var catMatch = activeCat === 'all' || s.category === activeCat;
    var searchMatch = !q || s.name.toLowerCase().indexOf(q) >= 0 || s.summary.toLowerCase().indexOf(q) >= 0;
    return catMatch && searchMatch;
  });

  document.getElementById('total-count').textContent = SKILLS.length;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No skills match your search.</div>';
    return;
  }

  if (q || activeCat === 'all') {
    // flat grid, no section headers
    var html = '<div class="grid">';
    filtered.forEach(function(s) { html += renderCard(s); });
    html += '</div>';
    container.innerHTML = html;
  } else {
    var label = CATEGORIES.find(function(c){ return c.id === activeCat; }).label;
    var html = '<div class="section-title">' + label + ' — ' + filtered.length + ' skills</div>';
    html += '<div class="grid">';
    filtered.forEach(function(s) { html += renderCard(s); });
    html += '</div>';
    container.innerHTML = html;
  }

  // attach click handlers
  container.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() {
      openModal(card.dataset.id);
    });
  });
}

function renderCard(s) {
  var badgeCls = 'cat-badge badge-' + s.category;
  var catLabel = s.category.charAt(0).toUpperCase() + s.category.slice(1);
  var slotLabel = s.slots === 1 ? '1 Mindspace slot' : s.slots + ' Mindspace slots';
  return '<div class="card" data-id="' + s.id + '">' +
    '<span class="' + badgeCls + '">' + catLabel + '</span>' +
    '<div class="card-top"><div class="card-icon">' + s.icon + '</div>' +
    '<div><div class="card-name">' + s.name + '</div>' +
    '<div class="card-slots">' + slotPips(s.slots) + ' ' + slotLabel + '</div></div></div>' +
    '<div class="card-summary">' + s.summary + '</div>' +
    '</div>';
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function openModal(id) {
  var s = SKILLS.find(function(x){ return x.id === id; });
  if (!s) return;

  document.getElementById('m-icon').textContent = s.icon;
  document.getElementById('m-name').textContent = s.name;

  var catEl = document.getElementById('m-cat');
  catEl.textContent = s.category.charAt(0).toUpperCase() + s.category.slice(1);
  catEl.className = 'modal-cat badge-' + s.category;

  var slotStr = s.slots === 1 ? '1 Mindspace slot' : s.slots + ' Mindspace slots';
  document.getElementById('m-slots').innerHTML = slotPips(s.slots, 3) + ' ' + slotStr;

  var atEl = document.getElementById('m-atrophy');
  atEl.textContent = ATROPHY_LABEL[s.atrophy] || s.atrophy;
  atEl.className = 'modal-atrophy atrophy-' + s.atrophy;

  document.getElementById('m-summary').textContent = s.summary;
  document.getElementById('m-discovery').textContent = s.discovery || '—';

  var costWrap = document.getElementById('m-cost-wrap');
  if (s.cost) {
    document.getElementById('m-cost').textContent = s.cost;
    costWrap.style.display = '';
  } else {
    costWrap.style.display = 'none';
  }

  var tiersHtml = '';
  s.tiers.forEach(function(t) {
    tiersHtml += '<tr><td class="tier-name">' + t.name + '</td><td class="tier-desc">' + t.desc + '</td></tr>';
  });
  document.getElementById('m-tiers').innerHTML = tiersHtml;

  var combosWrap = document.getElementById('m-combos-wrap');
  if (s.combinations && s.combinations.length) {
    var cHtml = s.combinations.map(function(c){ return '<li>' + c + '</li>'; }).join('');
    document.getElementById('m-combos').innerHTML = cHtml;
    combosWrap.style.display = '';
  } else {
    combosWrap.style.display = 'none';
  }

  var factionsWrap = document.getElementById('m-factions-wrap');
  if (s.factions) {
    var fHtml = '';
    Object.keys(s.factions).forEach(function(k) {
      fHtml += '<tr><td class="faction-name">' + k + '</td><td class="faction-react">' + s.factions[k] + '</td></tr>';
    });
    document.getElementById('m-factions').innerHTML = fHtml;
    factionsWrap.style.display = '';
  } else {
    factionsWrap.style.display = 'none';
  }

  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('modal-box').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  searchQuery = this.value;
  if (searchQuery) activeCat = 'all';
  buildSidebar();
  buildGrid();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
buildSidebar();
buildGrid();
</script>
</body>
</html>
