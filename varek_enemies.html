<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varek — Bestiary</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #2a283a;
    --gold: #c9a84e;
    --dim-gold: #8c7538;
    --text: #c7c0b0;
    --dim: #6a645c;
    --red: #b33030;
    --red-glow: #ff4422;
    --bone: #c0b898;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #12121a 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header .sub {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* Layout */
  .content {
    display: flex;
    height: calc(100vh - 100px);
  }

  /* Sidebar — enemy list */
  .sidebar {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar h3 {
    padding: 0 16px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .enemy-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .enemy-item:hover { background: #1a1a24; }
  .enemy-item.active {
    background: #1a1a24;
    border-left-color: var(--gold);
  }
  .enemy-icon {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .enemy-info .name {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .enemy-info .type {
    font-size: 11px;
    color: var(--dim);
  }

  /* Main viewer */
  .viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    min-width: 0;
  }

  #canvas-container {
    flex: 1;
    position: relative;
    background: radial-gradient(ellipse at center bottom, #1a1520 0%, #0a0a0f 70%);
  }
  #canvas-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .orbit-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--dim);
    opacity: 0.6;
    pointer-events: none;
  }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .anim-btn {
    padding: 6px 16px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .anim-btn:hover { border-color: var(--gold); color: var(--gold); }
  .anim-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: #1e1a14;
  }
  .speed-control {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }
  .speed-control input[type="range"] {
    width: 80px;
    accent-color: var(--gold);
  }
  .speed-val {
    font-size: 12px;
    color: var(--gold);
    min-width: 30px;
  }

  /* Stats panel */
  .stats-panel {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 220px;
    background: rgba(17, 17, 24, 0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    backdrop-filter: blur(8px);
  }
  .stats-panel h4 {
    color: var(--gold);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 12px;
  }
  .stat-label { color: var(--dim); }
  .stat-value { color: var(--text); font-weight: 500; }
  .stat-value.red { color: var(--red-glow); }
  .stat-value.gold { color: var(--gold); }

  .stat-bar {
    margin-top: 8px;
    height: 4px;
    background: #1a1a24;
    border-radius: 2px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .stat-bar-fill.health { background: linear-gradient(90deg, #8a2020, #cc3030); }
  .stat-bar-fill.perception { background: linear-gradient(90deg, var(--dim-gold), var(--gold)); }

  .lore-text {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--dim);
    font-style: italic;
    line-height: 1.5;
  }

  /* Loading */
  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--dim);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .loading.hidden { display: none; }

  /* ── Mobile / Tablet ────────────────────────────────── */
  @media (max-width: 768px) {
    .header { padding: 20px 16px 12px; }
    .header h1 { font-size: 24px; letter-spacing: 4px; }

    .content {
      flex-direction: column;
      height: auto;
      overflow-y: auto;
    }

    /* Sidebar → horizontal scrollable strip */
    .sidebar {
      width: 100%;
      min-width: unset;
      max-height: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 0;
    }
    .sidebar h3 { display: none; }
    #enemy-list {
      display: flex !important;
      flex-wrap: nowrap !important;
      overflow-x: auto;
      gap: 2px;
      padding: 0 8px;
      -webkit-overflow-scrolling: touch;
    }
    #enemy-list h3 { display: none !important; }
    .enemy-item {
      flex-direction: column;
      flex-shrink: 0;
      padding: 8px 14px;
      gap: 4px;
      border-left: none !important;
      border-bottom: 3px solid transparent;
      text-align: center;
      min-width: 80px;
    }
    .enemy-item.active {
      border-left-color: transparent !important;
      border-bottom-color: var(--gold);
    }
    .enemy-info .name { font-size: 12px; }
    .enemy-info .type { font-size: 10px; }

    /* Viewer — no flex grow, just natural flow */
    .viewer {
      flex: none;
      position: static;
      display: block;
    }
    #canvas-container {
      position: relative;
      height: 55vw;
      min-height: 250px;
      max-height: 400px;
    }

    /* Stats panel — flow below canvas, not overlaid */
    .stats-panel {
      position: static !important;
      width: 100% !important;
      border-radius: 0;
      border-left: none;
      border-right: none;
      backdrop-filter: none;
      background: var(--panel);
    }

    /* Controls bar */
    .controls {
      padding: 10px 12px;
      gap: 8px;
    }
    .speed-control { margin-left: 0; }

    .orbit-hint { font-size: 10px; bottom: 8px; }
  }

  @media (max-width: 400px) {
    .header h1 { font-size: 20px; letter-spacing: 3px; }
    .enemy-item { min-width: 70px; padding: 6px 10px; }
    .enemy-icon { width: 28px; height: 28px; font-size: 16px; }
    .stats-panel { padding: 10px; }
    .stats-panel h4 { font-size: 14px; }
    .stat-row { font-size: 11px; }
    .lore-text { font-size: 10px; }
    .anim-btn { padding: 5px 10px; font-size: 11px; }
    #canvas-container { height: 70vw; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Bestiary</h1>
  <div class="sub">Varek — Dark Fantasy RPG</div>
</div>

<div class="content">
  <div class="sidebar">
    <h3>Creatures</h3>
    <div id="enemy-list"></div>
  </div>

  <div class="viewer">
    <div id="canvas-container">
      <div class="loading" id="loading">Loading model...</div>
      <div class="orbit-hint">Click & drag to orbit | Scroll to zoom</div>
    </div>

    <div class="stats-panel" id="stats-panel"></div>

    <div class="controls">
      <label>Animation:</label>
      <div id="anim-buttons"></div>
      <div class="speed-control">
        <label>Speed:</label>
        <input type="range" id="speed-slider" min="0.1" max="3.0" step="0.1" value="1.0">
        <span class="speed-val" id="speed-val">1.0x</span>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

    model: 'enemies/cave_spider.glb',
    health: 15,

    perception: 0.9,
    xpReward: 20,
    lore: 'They cling to the ceilings where torchlight cannot reach, patient as stone. Eight eyes track every movement below. When they drop, it is fast — faster than a drawn sword. Their venom does not kill outright, but slows the blood until the legs give out. Then they feed.',

    lore: 'Not all who die move on. Some linger — tethered by grief, or rage, or oaths left unfinished. They drift through stone as though it were mist, and their touch burns cold enough to stop a heart. Steel passes through them. Only will and faith can lay them to rest.',

    lore: 'These were soldiers once — buried in their armor, swords still in hand. Whatever raised them did not strip away their training. They block, they parry, they advance in formation. Harder to kill than their bare-boned kin, and far more dangerous. The armor rusts but never falls.',

    faction: 'Local Garrison',
    lore: 'They march the same routes every night, boots heavy on the dirt. Most were farmers once. Now they carry spears they barely know how to use and scan the treeline for things they hope never come. The pay is poor, but the alternative is worse — out here, an unguarded camp is a dead camp.',

// ── Three.js Setup ──────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 50);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.0;
controls.maxDistance = 8.0;
controls.maxPolarAngle = Math.PI * 0.85;

// Lighting — dramatic dungeon feel
const ambientLight = new THREE.AmbientLight(0x222233, 0.4);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffe8cc, 1.2);
keyLight.position.set(2, 4, 3);
keyLight.castShadow = false;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0x4444aa, 0.5);
rimLight.position.set(-2, 2, -3);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff4422, 0.3, 5);
fillLight.position.set(0, 0.5, 1);
scene.add(fillLight);

// Ground plane — subtle grid
const groundGeo = new THREE.CircleGeometry(2, 48);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x15151e,
  roughness: 0.95,
  metallic: 0.0,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Ground ring
const ringGeo = new THREE.RingGeometry(1.8, 1.85, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x2a283a, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.001;
scene.add(ring);

// ── State ──────────────────────────────────────────────────────────
let currentModel = null;
let mixer = null;
let currentActions = {};
let activeAction = null;
let clock = new THREE.Clock();

// ── Resize ──────────────────────────────────────────────────────────
function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Render loop ────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Load model ─────────────────────────────────────────────────────
const loader = new GLTFLoader();

function loadEnemy(enemy) {
  // Clear previous model
  if (currentModel) {
    scene.remove(currentModel);
    currentModel = null;
  }
  mixer = null;
  currentActions = {};
  activeAction = null;

  const loading = document.getElementById('loading');

  if (!enemy.model) {
    loading.classList.add('hidden');
    const group = new THREE.Group();

    // Generic placeholder capsule
    loading.textContent = 'Model not yet created — placeholder';
    loading.classList.remove('hidden');
    const geo = new THREE.CapsuleGeometry(0.3, 0.8, 8, 16);
    const mat = new THREE.MeshStandardMaterial({
      color: enemy.id === 'cave_rat' ? 0x664d3f : 0x505560,
      roughness: 0.8,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.7;
    group.add(mesh);

    scene.add(group);
    currentModel = group;
    updateAnimButtons([]);
    return;
  }

  loading.textContent = 'Loading model...';
  loading.classList.remove('hidden');

  loader.load(enemy.model, (gltf) => {
    loading.classList.add('hidden');

    const model = gltf.scene;
    scene.add(model);
    currentModel = model;

    // Setup animations
    const animNames = [];
    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(clip => {
        const action = mixer.clipAction(clip);
        currentActions[clip.name] = action;
        animNames.push(clip.name);
      });
      // Play idle by default
      if (currentActions['idle']) {
        playAnimation('idle');
      } else if (animNames.length > 0) {
        playAnimation(animNames[0]);
      }
    }

    updateAnimButtons(animNames);
  }, undefined, (err) => {
    loading.textContent = 'Failed to load model';
    loading.classList.remove('hidden');
    console.error(err);
  });

  // Set camera
  camera.position.set(enemy.cameraPos.x, enemy.cameraPos.y, enemy.cameraPos.z);
  controls.target.set(enemy.cameraTarget.x, enemy.cameraTarget.y, enemy.cameraTarget.z);
  controls.update();
}

function playAnimation(name) {
  if (!currentActions[name]) return;

  const newAction = currentActions[name];
  const isOneShot = (name === 'attack' || name === 'gesture');

  if (activeAction && activeAction !== newAction) {
    activeAction.fadeOut(0.3);
  }

  newAction.reset();
  newAction.fadeIn(0.3);

  if (isOneShot) {
    newAction.setLoop(THREE.LoopOnce);
    newAction.clampWhenFinished = true;

    // Return to idle after attack finishes
    if (mixer) {
      const onFinish = (e) => {
        if (e.action === newAction) {
          mixer.removeEventListener('finished', onFinish);
          if (currentActions['idle']) {
            playAnimation('idle');
          }
        }
      };
      mixer.addEventListener('finished', onFinish);
    }
  } else {
    newAction.setLoop(THREE.LoopRepeat);
    newAction.clampWhenFinished = false;
  }

  newAction.play();
  activeAction = newAction;

  // Update button states
  document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.anim === name);
  });
}

function updateAnimButtons(names) {
  const container = document.getElementById('anim-buttons');
  container.innerHTML = '';
  if (names.length === 0) {
    container.innerHTML = '<span style="font-size:12px;color:var(--dim)">No animations</span>';
    return;
  }
  names.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'anim-btn';
    btn.dataset.anim = name;
    btn.textContent = name.charAt(0).toUpperCase() + name.slice(1);
    btn.addEventListener('click', () => playAnimation(name));
    container.appendChild(btn);
  });
  // Mark first as active
  const first = container.querySelector('.anim-btn');
  if (first) first.classList.add('active');
}

// ── Speed control ──────────────────────────────────────────────────
const speedSlider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-val');
speedSlider.addEventListener('input', () => {
  const speed = parseFloat(speedSlider.value);
  speedVal.textContent = speed.toFixed(1) + 'x';
  if (mixer) mixer.timeScale = speed;
});

// ── Sidebar ────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('enemy-list');
  list.innerHTML = '';

  const enemies = ENEMIES.filter(e => e.category === 'enemy');
  const wildlife = ENEMIES.filter(e => e.category === 'wildlife');
  const npcs = ENEMIES.filter(e => e.category === 'npc');

  function addSection(title, items) {
    const header = document.createElement('h3');
    header.textContent = title;
    header.style.padding = '0 16px';
    header.style.fontSize = '11px';
    header.style.color = 'var(--dim)';
    header.style.letterSpacing = '2px';
    header.style.textTransform = 'uppercase';
    header.style.marginBottom = '8px';
    header.style.marginTop = '12px';
    list.appendChild(header);

    items.forEach((enemy, i) => {
      const item = document.createElement('div');
      const isFirst = (title === 'Creatures' && i === 0);
      item.className = 'enemy-item' + (isFirst ? ' active' : '');
      item.dataset.id = enemy.id;
      item.innerHTML = `
        <div class="enemy-icon" style="background:${enemy.iconBg}">${enemy.icon}</div>
        <div class="enemy-info">
          <div class="name">${enemy.name}</div>
          <div class="type">${enemy.type}</div>
        </div>
      `;
      item.addEventListener('click', () => selectEnemy(enemy.id));
      list.appendChild(item);
    });
  }

  addSection('Creatures', enemies);
  if (wildlife.length > 0) addSection('Wildlife', wildlife);
  if (npcs.length > 0) addSection('NPCs', npcs);
}

function selectEnemy(id) {
  const enemy = ENEMIES.find(e => e.id === id);
  if (!enemy) return;

  // Update sidebar active state
  document.querySelectorAll('.enemy-item').forEach(item => {
    item.classList.toggle('active', item.dataset.id === id);
  });

  // Update stats panel
  renderStats(enemy);

  // Load model
  loadEnemy(enemy);
}

// ── Init ──────────────────────────────────────────────────────────
renderSidebar();
selectEnemy('skeleton');
</script>
