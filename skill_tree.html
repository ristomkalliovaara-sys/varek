<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varek — Skill Tree</title>
<style>
  :root {
    --bg: #0e0e14;
    --panel: #131319;
    --border: #2e2c3d;
    --gold: #c9a84e;
    --dim-gold: #8c7538;
    --text: #c7c0b0;
    --dim: #787068;
    --mana: #2640b3;
    --green: #33a63c;
    --red: #b33030;
    --purple: #6620aa;
    --slot-bg: #1a1a24;
    --hover: #1e1e2a;
    --cross: #c06030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    color: var(--gold);
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: var(--dim);
    font-size: 13px;
    margin-bottom: 24px;
  }
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    padding: 10px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
  }
  .stats-bar span { color: var(--dim); }
  .stats-bar strong { color: var(--gold); }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 8px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px 6px 0 0;
    color: var(--dim);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--hover); }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--bg);
    background: var(--bg);
  }

  .category-panel {
    display: none;
  }
  .category-panel.active { display: block; }

  /* Major skill card */
  .skill-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .skill-card:hover { border-color: #3e3c50; }

  .skill-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .skill-header:hover { background: var(--hover); }

  .chevron {
    color: var(--dim);
    font-size: 12px;
    transition: transform 0.2s;
    width: 16px;
    text-align: center;
  }
  .skill-card.open .chevron { transform: rotate(90deg); }

  .skill-icon {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .skill-icon.gathering { background: #2a6030; }
  .skill-icon.crafting { background: #806020; }
  .skill-icon.combat { background: #802828; }
  .skill-icon.magic { background: #302880; }

  .skill-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .skill-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--dim);
  }
  .skill-meta .slots { color: var(--dim-gold); }
  .atrophy-slow { color: #5a8a5a; }
  .atrophy-moderate { color: #8a8a5a; }
  .atrophy-fast { color: #8a5a5a; }

  /* Sub-skills container */
  .sub-skills {
    display: none;
    padding: 0 16px 12px 60px;
  }
  .skill-card.open .sub-skills { display: block; }

  .sub-skill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 4px;
    background: var(--slot-bg);
    border: 1px solid transparent;
    border-radius: 4px;
    transition: border-color 0.15s;
    position: relative;
  }
  .sub-skill:hover { border-color: var(--border); }
  .sub-skill.cross-skill { border-left: 3px solid var(--cross); }

  .sub-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sub-name {
    font-size: 13px;
    color: var(--text);
    min-width: 140px;
  }

  .sub-req {
    font-size: 11px;
    color: var(--dim);
    min-width: 120px;
  }
  .sub-req .level-num { color: var(--dim-gold); }

  .sub-desc {
    font-size: 11px;
    color: var(--dim);
    font-style: italic;
    flex: 1;
  }

  .sub-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .btn-sm {
    padding: 3px 10px;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--panel);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--gold); color: var(--gold); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm.add:hover { border-color: var(--green); color: var(--green); }

  /* Add sub-skill form */
  .add-form {
    display: none;
    padding: 10px 12px;
    margin-top: 6px;
    background: #16161e;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .add-form.visible { display: block; }
  .add-form label {
    display: block;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 3px;
    margin-top: 8px;
  }
  .add-form label:first-child { margin-top: 0; }
  .add-form input, .add-form select, .add-form textarea {
    width: 100%;
    padding: 6px 8px;
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: inherit;
  }
  .add-form input:focus, .add-form select:focus, .add-form textarea:focus {
    outline: none;
    border-color: var(--gold);
  }
  .add-form textarea { resize: vertical; min-height: 40px; }
  .form-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .form-row > div { flex: 1; }
  .form-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .btn {
    padding: 6px 16px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); }
  .btn.primary {
    background: #2a2520;
    border-color: var(--dim-gold);
    color: var(--gold);
  }
  .btn.primary:hover { background: #3a3020; }

  .add-trigger {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--dim);
    cursor: pointer;
    border: 1px dashed var(--border);
    border-radius: 4px;
    transition: all 0.15s;
  }
  .add-trigger:hover { border-color: var(--gold); color: var(--gold); }

  /* Cross-skills section */
  .cross-section {
    margin-top: 24px;
  }
  .cross-header {
    color: var(--cross);
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cross-header::before {
    content: '';
    display: block;
    width: 20px;
    height: 2px;
    background: var(--cross);
  }

  /* Export area */
  .export-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .export-section h3 {
    color: var(--dim-gold);
    font-size: 14px;
    margin-bottom: 10px;
  }
  .export-btn {
    padding: 8px 20px;
    font-size: 13px;
    border: 1px solid var(--dim-gold);
    border-radius: 4px;
    background: #1e1a14;
    color: var(--gold);
    cursor: pointer;
    margin-right: 8px;
    transition: all 0.15s;
  }
  .export-btn:hover { background: #2e2a1e; }
  #export-output {
    margin-top: 12px;
    padding: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--text);
    white-space: pre;
    overflow-x: auto;
    max-height: 500px;
    overflow-y: auto;
    display: none;
  }

  /* Req tag pills */
  .req-pill {
    display: inline-block;
    padding: 1px 6px;
    font-size: 10px;
    border-radius: 3px;
    background: #1e1e2a;
    border: 1px solid var(--border);
    color: var(--dim-gold);
    margin-right: 3px;
  }
  .req-pill.cross { border-color: var(--cross); color: var(--cross); }

  /* Edit inline */
  .edit-inline {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-size: 12px;
    padding: 2px 6px;
    font-family: inherit;
  }
  .edit-inline:focus { outline: none; border-color: var(--gold); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 20px;
    background: #2a2520;
    border: 1px solid var(--dim-gold);
    border-radius: 6px;
    color: var(--gold);
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<h1>VAREK SKILL TREE</h1>
<p class="subtitle">Click a major skill to expand. Add, edit, or remove sub-skills. Export to GDScript when done.</p>

<div class="stats-bar" id="stats-bar"></div>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<div class="cross-section" id="cross-section">
  <div class="cross-header">Cross-Skill Combinations</div>
  <div id="cross-list"></div>
  <div class="add-trigger" onclick="showAddCrossForm()">+ Add cross-skill</div>
  <div class="add-form" id="add-cross-form">
    <div class="form-row">
      <div>
        <label>Skill ID (snake_case)</label>
        <input type="text" id="cross-id" placeholder="e.g. necromancy">
      </div>
      <div>
        <label>Primary Parent</label>
        <select id="cross-parent"></select>
      </div>
      <div>
        <label>Category</label>
        <select id="cross-category">
          <option value="combat">Combat</option>
          <option value="magic">Magic</option>
          <option value="gathering">Gathering</option>
          <option value="crafting">Crafting</option>
        </select>
      </div>
    </div>
    <label>Requirements (skill:level, comma separated)</label>
    <input type="text" id="cross-reqs" placeholder="e.g. summoning:13, vitalism:8">
    <label>Description</label>
    <input type="text" id="cross-desc" placeholder="What does this skill do?">
    <div class="form-actions">
      <button class="btn primary" onclick="addCrossSkill()">Add</button>
      <button class="btn" onclick="hideAddCrossForm()">Cancel</button>
    </div>
  </div>
</div>

<div class="export-section">
  <h3>Export</h3>
  <button class="export-btn" onclick="exportGDScript()">Copy as GDScript SKILL_META</button>
  <button class="export-btn" onclick="exportJSON()">Copy as JSON</button>
  <pre id="export-output"></pre>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────
const CATEGORIES = ['gathering', 'crafting', 'combat', 'magic'];
const CAT_LABELS = { gathering: 'Gathering', crafting: 'Crafting', combat: 'Combat', magic: 'Magic' };

const DESCRIPTIONS = {
  timber_sense: 'Highlight harvestable trees at range',
  efficient_chop: 'Bonus wood yield per swing',
  ore_sense: 'Highlight mineral deposits at range',
  efficient_mining: 'Bonus ore yield per swing',
  preservation: 'Food buffs last longer',
  feast_cooking: 'Cook larger batches (2x output)',
  quick_slash: 'Faster attack speed with daggers',
  backstab: 'Enhanced sneak attack damage with daggers',
  poison_blade: 'Attacks apply damage over time',
  power_strike: 'Heavy overhead strike',
  riposte: 'Counter-attack window after blocking',
  whirlwind: 'AoE swing hitting all nearby enemies',
  cleave: 'Hit damages multiple enemies in arc',
  rending_blow: 'Attacks reduce target armor',
  stun_strike: 'Chance to stun enemy on hit',
  shield_break: 'Attacks ignore a portion of armor',
  steady_aim: 'Increased damage at longer range',
  rapid_shot: 'Faster attack speed',
  piercing_shot: 'Arrow penetrates through first target',
  second_wind: 'Stamina regen burst when stamina hits zero',
  tumble: 'Dodge roll ability',
  iron_lungs: 'Sprint stamina cost reduced significantly',
  pickpocket: 'Steal items from NPCs',
  shadow_step: 'Brief speed burst while stealthed',
  vanish: 'Break combat and re-enter stealth',
  summon_elite: 'Summon a stronger creature variant',
  soul_link: 'Share damage with a linked minion',
  binding: 'Attempt to bind a wild creature as minion',
  command: 'Give minions specific tactical orders',
  empower_minion: 'Temporarily boost a minion stats',
  mass_command: 'Issue orders to all minions simultaneously',
  mend_minions: 'Heal nearby minions',
  greater_heal: 'Powerful self-heal',
  rejuvenation: 'Heal-over-time effect on self',
  purify: 'Remove negative status effects',
  necromancy: 'Raise undead from corpses',
  battle_trance: 'Self-buff: temporary damage and speed boost',
  ranger: 'Enhanced damage from stealth with ranged weapons',
  assassinate: 'One-hit lethal strike from stealth on vulnerable targets',
  minion_mastery: 'Minions gain permanent stat bonuses',
};

// Build skill data from SKILL_META
let skillData = {
  // Main skills
  woodcutting: { category: 'gathering', atrophy: 'moderate', slots: 3, subs: [] },
  mining:      { category: 'gathering', atrophy: 'moderate', slots: 3, subs: [] },
  cooking:     { category: 'crafting',  atrophy: 'moderate', slots: 3, subs: [] },
  daggers:     { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  swords:      { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  axes:        { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  hammers:     { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  bows:        { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  athletics:   { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  stealth:     { category: 'combat',    atrophy: 'slow', slots: 3, subs: [] },
  summoning:   { category: 'magic',     atrophy: 'fast', slots: 3, subs: [] },
  dominion:    { category: 'magic',     atrophy: 'fast', slots: 3, subs: [] },
  vitalism:    { category: 'magic',     atrophy: 'fast', slots: 3, subs: [] },
};

// Sub-skills (non-cross)
let subSkills = [
  { id: 'timber_sense',    parent: 'woodcutting', category: 'gathering', atrophy: 'moderate', requires: [{skill:'woodcutting',level:3}] },
  { id: 'efficient_chop',  parent: 'woodcutting', category: 'gathering', atrophy: 'moderate', requires: [{skill:'woodcutting',level:8}] },
  { id: 'ore_sense',       parent: 'mining',      category: 'gathering', atrophy: 'moderate', requires: [{skill:'mining',level:3}] },
  { id: 'efficient_mining', parent: 'mining',     category: 'gathering', atrophy: 'moderate', requires: [{skill:'mining',level:8}] },
  { id: 'preservation',    parent: 'cooking',     category: 'crafting',  atrophy: 'moderate', requires: [{skill:'cooking',level:3}] },
  { id: 'feast_cooking',   parent: 'cooking',     category: 'crafting',  atrophy: 'moderate', requires: [{skill:'cooking',level:8}] },
  { id: 'quick_slash',     parent: 'daggers',     category: 'combat',    atrophy: 'slow', requires: [{skill:'daggers',level:3}] },
  { id: 'backstab',        parent: 'daggers',     category: 'combat',    atrophy: 'slow', requires: [{skill:'daggers',level:5},{skill:'stealth',level:3}] },
  { id: 'poison_blade',    parent: 'daggers',     category: 'combat',    atrophy: 'slow', requires: [{skill:'daggers',level:10}] },
  { id: 'power_strike',    parent: 'swords',      category: 'combat',    atrophy: 'slow', requires: [{skill:'swords',level:5}] },
  { id: 'riposte',         parent: 'swords',      category: 'combat',    atrophy: 'slow', requires: [{skill:'swords',level:8}] },
  { id: 'whirlwind',       parent: 'swords',      category: 'combat',    atrophy: 'slow', requires: [{skill:'swords',level:13}] },
  { id: 'cleave',          parent: 'axes',        category: 'combat',    atrophy: 'slow', requires: [{skill:'axes',level:3}] },
  { id: 'rending_blow',    parent: 'axes',        category: 'combat',    atrophy: 'slow', requires: [{skill:'axes',level:8}] },
  { id: 'stun_strike',     parent: 'hammers',     category: 'combat',    atrophy: 'slow', requires: [{skill:'hammers',level:3}] },
  { id: 'shield_break',    parent: 'hammers',     category: 'combat',    atrophy: 'slow', requires: [{skill:'hammers',level:8}] },
  { id: 'steady_aim',      parent: 'bows',        category: 'combat',    atrophy: 'slow', requires: [{skill:'bows',level:3}] },
  { id: 'rapid_shot',      parent: 'bows',        category: 'combat',    atrophy: 'slow', requires: [{skill:'bows',level:8}] },
  { id: 'piercing_shot',   parent: 'bows',        category: 'combat',    atrophy: 'slow', requires: [{skill:'bows',level:13}] },
  { id: 'second_wind',     parent: 'athletics',   category: 'combat',    atrophy: 'slow', requires: [{skill:'athletics',level:3}] },
  { id: 'tumble',          parent: 'athletics',   category: 'combat',    atrophy: 'slow', requires: [{skill:'athletics',level:8}] },
  { id: 'iron_lungs',      parent: 'athletics',   category: 'combat',    atrophy: 'slow', requires: [{skill:'athletics',level:13}] },
  { id: 'pickpocket',      parent: 'stealth',     category: 'combat',    atrophy: 'slow', requires: [{skill:'stealth',level:5}] },
  { id: 'shadow_step',     parent: 'stealth',     category: 'combat',    atrophy: 'slow', requires: [{skill:'stealth',level:8}] },
  { id: 'vanish',          parent: 'stealth',     category: 'combat',    atrophy: 'slow', requires: [{skill:'stealth',level:13}] },
  { id: 'summon_elite',    parent: 'summoning',   category: 'magic',     atrophy: 'fast', requires: [{skill:'summoning',level:5}] },
  { id: 'soul_link',       parent: 'summoning',   category: 'magic',     atrophy: 'fast', requires: [{skill:'summoning',level:8}] },
  { id: 'binding',         parent: 'summoning',   category: 'magic',     atrophy: 'fast', requires: [{skill:'summoning',level:13}] },
  { id: 'command',         parent: 'dominion',    category: 'magic',     atrophy: 'fast', requires: [{skill:'dominion',level:3}] },
  { id: 'empower_minion',  parent: 'dominion',    category: 'magic',     atrophy: 'fast', requires: [{skill:'dominion',level:8}] },
  { id: 'mass_command',    parent: 'dominion',    category: 'magic',     atrophy: 'fast', requires: [{skill:'dominion',level:13}] },
  { id: 'mend_minions',    parent: 'vitalism',    category: 'magic',     atrophy: 'fast', requires: [{skill:'vitalism',level:3}] },
  { id: 'greater_heal',    parent: 'vitalism',    category: 'magic',     atrophy: 'fast', requires: [{skill:'vitalism',level:5}] },
  { id: 'rejuvenation',    parent: 'vitalism',    category: 'magic',     atrophy: 'fast', requires: [{skill:'vitalism',level:10}] },
  { id: 'purify',          parent: 'vitalism',    category: 'magic',     atrophy: 'fast', requires: [{skill:'vitalism',level:13}] },
];

// Cross-skill combinations
let crossSkills = [
  { id: 'necromancy',      parent: 'summoning', category: 'magic',  atrophy: 'fast', requires: [{skill:'summoning',level:13},{skill:'vitalism',level:8}] },
  { id: 'battle_trance',   parent: 'athletics', category: 'combat', atrophy: 'slow', requires: [{skill:'athletics',level:8},{skill:'vitalism',level:5}] },
  { id: 'ranger',          parent: 'bows',      category: 'combat', atrophy: 'slow', requires: [{skill:'bows',level:8},{skill:'stealth',level:5}] },
  { id: 'assassinate',     parent: 'daggers',   category: 'combat', atrophy: 'slow', requires: [{skill:'daggers',level:10},{skill:'stealth',level:8}] },
  { id: 'minion_mastery',  parent: 'summoning', category: 'magic',  atrophy: 'fast', requires: [{skill:'summoning',level:8},{skill:'dominion',level:8}] },
];

// ── Helpers ──────────────────────────────────────────────────────
function displayName(id) {
  return id.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function reqText(reqs) {
  return reqs.map(r =>
    `<span class="req-pill ${reqs.length > 1 ? 'cross' : ''}">${displayName(r.skill)} <span class="level-num">${r.level}</span></span>`
  ).join(' ');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getMainSkills() { return Object.keys(skillData); }

// ── Render ──────────────────────────────────────────────────────
function render() {
  renderStats();
  renderTabs();
  renderPanels();
  renderCross();
  populateParentSelects();
}

function renderStats() {
  const mainCount = Object.keys(skillData).length;
  const subCount = subSkills.length;
  const crossCount = crossSkills.length;
  const totalSlots = mainCount * 3 + subCount + crossCount;
  document.getElementById('stats-bar').innerHTML =
    `<span>Major Skills: <strong>${mainCount}</strong></span>` +
    `<span>Sub-Skills: <strong>${subCount}</strong></span>` +
    `<span>Cross-Skills: <strong>${crossCount}</strong></span>` +
    `<span>Total Entries: <strong>${mainCount + subCount + crossCount}</strong></span>` +
    `<span>Total Slot Cost: <strong>${totalSlots}</strong></span>`;
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = CATEGORIES.map((cat, i) => {
    const skills = getMainSkills().filter(s => skillData[s].category === cat);
    return `<div class="tab ${i === 0 ? 'active' : ''}" data-cat="${cat}" onclick="switchTab('${cat}')">${CAT_LABELS[cat]} (${skills.length})</div>`;
  }).join('');
}

function switchTab(cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  document.querySelectorAll('.category-panel').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = CATEGORIES.map((cat, i) => {
    const skills = getMainSkills().filter(s => skillData[s].category === cat);
    const cards = skills.map(sk => renderSkillCard(sk, skillData[sk], cat)).join('');
    return `<div class="category-panel ${i === 0 ? 'active' : ''}" data-cat="${cat}">${cards}</div>`;
  }).join('');
}

function renderSkillCard(id, data, cat) {
  const subs = subSkills.filter(s => s.parent === id).sort((a, b) => {
    const aLv = Math.max(...a.requires.map(r => r.level));
    const bLv = Math.max(...b.requires.map(r => r.level));
    return aLv - bLv;
  });
  const crosses = crossSkills.filter(s => s.parent === id);

  return `
    <div class="skill-card" id="card-${id}">
      <div class="skill-header" onclick="toggleCard('${id}')">
        <span class="chevron">&#9654;</span>
        <div class="skill-icon ${cat}"></div>
        <span class="skill-name">${displayName(id)}</span>
        <div class="skill-meta">
          <span class="slots">${data.slots} slots</span>
          <span class="atrophy-${data.atrophy}">${data.atrophy} atrophy</span>
          <span>${subs.length + crosses.length} sub-skills</span>
        </div>
      </div>
      <div class="sub-skills">
        ${subs.map(s => renderSubSkill(s, false)).join('')}
        ${crosses.map(s => renderSubSkill(s, true)).join('')}
        <div class="add-trigger" onclick="showAddForm('${id}')">+ Add sub-skill to ${displayName(id)}</div>
        <div class="add-form" id="add-form-${id}">
          <div class="form-row">
            <div>
              <label>Skill ID (snake_case)</label>
              <input type="text" id="new-id-${id}" placeholder="e.g. heavy_chop">
            </div>
            <div>
              <label>Required Level</label>
              <input type="number" id="new-level-${id}" value="3" min="1" max="50">
            </div>
          </div>
          <label>Extra Requirements (optional, skill:level comma separated)</label>
          <input type="text" id="new-extra-reqs-${id}" placeholder="e.g. stealth:3">
          <label>Description</label>
          <input type="text" id="new-desc-${id}" placeholder="What does this skill do?">
          <div class="form-actions">
            <button class="btn primary" onclick="addSubSkill('${id}')">Add</button>
            <button class="btn" onclick="hideAddForm('${id}')">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSubSkill(sub, isCross) {
  const desc = DESCRIPTIONS[sub.id] || '';
  const dotColor = isCross ? 'var(--cross)' : (
    sub.category === 'combat' ? 'var(--red)' :
    sub.category === 'magic' ? 'var(--purple)' :
    sub.category === 'gathering' ? 'var(--green)' :
    'var(--dim-gold)'
  );
  return `
    <div class="sub-skill ${isCross ? 'cross-skill' : ''}" id="sub-${sub.id}">
      <div class="sub-dot" style="background:${dotColor}"></div>
      <span class="sub-name">${displayName(sub.id)}</span>
      <span class="sub-req">${reqText(sub.requires)}</span>
      <span class="sub-desc">${desc}</span>
      <div class="sub-actions">
        <button class="btn-sm danger" onclick="removeSub('${sub.id}', ${isCross})">x</button>
      </div>
    </div>
  `;
}

function renderCross() {
  const list = document.getElementById('cross-list');
  list.innerHTML = crossSkills.map(s => {
    const desc = DESCRIPTIONS[s.id] || '';
    return `
      <div class="sub-skill cross-skill" style="margin-bottom:4px">
        <div class="sub-dot" style="background:var(--cross)"></div>
        <span class="sub-name">${displayName(s.id)}</span>
        <span class="sub-req">${reqText(s.requires)}</span>
        <span class="sub-desc">${desc} <span style="color:var(--dim);font-size:10px">(parent: ${displayName(s.parent)})</span></span>
        <div class="sub-actions">
          <button class="btn-sm danger" onclick="removeSub('${s.id}', true)">x</button>
        </div>
      </div>
    `;
  }).join('');
}

function populateParentSelects() {
  const sel = document.getElementById('cross-parent');
  sel.innerHTML = getMainSkills().map(s => `<option value="${s}">${displayName(s)}</option>`).join('');
}

// ── Interactions ──────────────────────────────────────────────────
function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

function showAddForm(parent) {
  document.getElementById('add-form-' + parent).classList.add('visible');
}
function hideAddForm(parent) {
  document.getElementById('add-form-' + parent).classList.remove('visible');
}

function showAddCrossForm() {
  document.getElementById('add-cross-form').classList.add('visible');
}
function hideAddCrossForm() {
  document.getElementById('add-cross-form').classList.remove('visible');
}

function addSubSkill(parent) {
  const id = document.getElementById('new-id-' + parent).value.trim().toLowerCase().replace(/\s+/g, '_');
  const level = parseInt(document.getElementById('new-level-' + parent).value) || 3;
  const desc = document.getElementById('new-desc-' + parent).value.trim();
  const extraReqs = document.getElementById('new-extra-reqs-' + parent).value.trim();

  if (!id) { toast('Enter a skill ID'); return; }
  if (subSkills.some(s => s.id === id) || crossSkills.some(s => s.id === id)) { toast('ID already exists'); return; }

  const data = skillData[parent];
  const requires = [{ skill: parent, level: level }];

  // Parse extra requirements
  if (extraReqs) {
    extraReqs.split(',').forEach(part => {
      const [sk, lv] = part.trim().split(':');
      if (sk && lv) requires.push({ skill: sk.trim(), level: parseInt(lv) });
    });
  }

  const isCross = requires.length > 1;
  const newSub = {
    id, parent, category: data.category, atrophy: data.atrophy, requires
  };

  if (desc) DESCRIPTIONS[id] = desc;

  if (isCross) {
    crossSkills.push(newSub);
  } else {
    subSkills.push(newSub);
  }

  render();
  // Reopen the card
  document.getElementById('card-' + parent)?.classList.add('open');
  switchTab(data.category);
  toast(`Added: ${displayName(id)}`);
}

function addCrossSkill() {
  const id = document.getElementById('cross-id').value.trim().toLowerCase().replace(/\s+/g, '_');
  const parent = document.getElementById('cross-parent').value;
  const category = document.getElementById('cross-category').value;
  const reqStr = document.getElementById('cross-reqs').value.trim();
  const desc = document.getElementById('cross-desc').value.trim();

  if (!id) { toast('Enter a skill ID'); return; }
  if (!reqStr) { toast('Enter requirements'); return; }
  if (subSkills.some(s => s.id === id) || crossSkills.some(s => s.id === id)) { toast('ID already exists'); return; }

  const requires = reqStr.split(',').map(part => {
    const [sk, lv] = part.trim().split(':');
    return { skill: sk.trim(), level: parseInt(lv) || 1 };
  });

  const atrophyMap = { combat: 'slow', magic: 'fast', gathering: 'moderate', crafting: 'moderate' };

  if (desc) DESCRIPTIONS[id] = desc;

  crossSkills.push({ id, parent, category, atrophy: atrophyMap[category], requires });
  render();
  hideAddCrossForm();
  toast(`Added cross-skill: ${displayName(id)}`);
}

function removeSub(id, isCross) {
  if (isCross) {
    crossSkills = crossSkills.filter(s => s.id !== id);
  } else {
    subSkills = subSkills.filter(s => s.id !== id);
  }
  render();
  // Keep current tab active
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) switchTab(activeTab.dataset.cat);
  toast(`Removed: ${displayName(id)}`);
}

// ── Export ──────────────────────────────────────────────────────
function exportGDScript() {
  let out = 'const SKILL_META := {\n';
  out += '\t# ── Main skills (3 slots each) ──\n';

  for (const cat of CATEGORIES) {
    const skills = getMainSkills().filter(s => skillData[s].category === cat);
    for (const sk of skills) {
      const d = skillData[sk];
      out += `\t"${sk}": { "category": "${d.category}", "atrophy": "${d.atrophy}", "slots": ${d.slots} },\n`;
    }
  }

  out += '\n\t# ── Sub-skills (1 slot, unlocked by prerequisites) ──\n';

  // Group by parent
  const parents = [...new Set(subSkills.map(s => s.parent))];
  for (const p of parents) {
    const subs = subSkills.filter(s => s.parent === p).sort((a, b) => {
      const aLv = Math.max(...a.requires.map(r => r.level));
      const bLv = Math.max(...b.requires.map(r => r.level));
      return aLv - bLv;
    });
    out += `\n\t# — ${displayName(p)} sub-skills —\n`;
    for (const s of subs) {
      const reqStr = s.requires.map(r => `{ "skill": "${r.skill}", "level": ${r.level} }`).join(', ');
      const isCross = s.requires.length > 1;
      if (isCross) {
        out += `\t"${s.id}": {\n`;
        out += `\t\t"category": "${s.category}", "atrophy": "${s.atrophy}", "slots": 1,\n`;
        out += `\t\t"parent": "${s.parent}",\n`;
        out += `\t\t"requires": [\n`;
        for (const r of s.requires) {
          out += `\t\t\t{ "skill": "${r.skill}", "level": ${r.level} },\n`;
        }
        out += `\t\t],\n\t},\n`;
      } else {
        out += `\t"${s.id}": {\n`;
        out += `\t\t"category": "${s.category}", "atrophy": "${s.atrophy}", "slots": 1,\n`;
        out += `\t\t"parent": "${s.parent}",\n`;
        out += `\t\t"requires": [${reqStr}],\n`;
        out += `\t},\n`;
      }
    }
  }

  if (crossSkills.length > 0) {
    out += '\n\t# — Cross-skill combinations —\n';
    for (const s of crossSkills) {
      out += `\t"${s.id}": {\n`;
      out += `\t\t"category": "${s.category}", "atrophy": "${s.atrophy}", "slots": 1,\n`;
      out += `\t\t"parent": "${s.parent}",\n`;
      out += `\t\t"requires": [\n`;
      for (const r of s.requires) {
        out += `\t\t\t{ "skill": "${r.skill}", "level": ${r.level} },\n`;
      }
      out += `\t\t],\n\t},\n`;
    }
  }

  out += '}\n';

  navigator.clipboard.writeText(out).then(() => toast('Copied GDScript to clipboard!'));
  const el = document.getElementById('export-output');
  el.style.display = 'block';
  el.textContent = out;
}

function exportJSON() {
  const all = {};

  for (const sk of getMainSkills()) {
    const d = skillData[sk];
    all[sk] = { category: d.category, atrophy: d.atrophy, slots: d.slots };
  }

  for (const s of [...subSkills, ...crossSkills]) {
    all[s.id] = {
      category: s.category, atrophy: s.atrophy, slots: 1,
      parent: s.parent, requires: s.requires,
      description: DESCRIPTIONS[s.id] || ''
    };
  }

  const json = JSON.stringify(all, null, 2);
  navigator.clipboard.writeText(json).then(() => toast('Copied JSON to clipboard!'));
  const el = document.getElementById('export-output');
  el.style.display = 'block';
  el.textContent = json;
}

// ── Init ──────────────────────────────────────────────────────
render();
</script>
</body>
